spring:
  datasource:
    url: jdbc:mysql://localhost:3306/base_framework_db
    username: root
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: mySuperSecretKeyForJwtAuthenticationThatIsVeryLongAndSecure123456789
  expiration: 86400000
  refresh-expiration: 604800000

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173

server:
  port: 8080
