spring:
  datasource:
    url: jdbc:mysql://produccion:3306/base_framework_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
  refresh-expiration: 604800000

cors:
  allowed-origins: ${CORS_ORIGINS}

server:
  port: 8080
